<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>福州公园 · 古渡日记账 </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            background: #f8f4e8;
        }
        .journal-container {
            display: flex;
            height: 100%;
            width: 100%;
        }
        .entries-panel {
            width: 360px;
            background: #fefaf2;
            border-right: 1px solid #e6ddce;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0,0,0,0.02);
            z-index: 2;
            overflow-y: auto;
        }
        .journal-header {
            padding: 28px 24px 20px;
            border-bottom: 1px solid #e9dfcf;
            background: #ffffffd9;
        }
        .journal-header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: #6b3e1c;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .journal-header h1 i {
            color: #b85c1a;
            font-size: 1.6rem;
        }
        .journal-header p {
            font-size: 0.85rem;
            color: #8b6f4c;
            margin-top: 8px;
            font-weight: 400;
        }
        .entries-list {
            flex: 1;
            padding: 20px 16px 32px;
        }
        .entry-card {
            padding: 18px 20px;
            margin-bottom: 14px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.03);
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid #f0e4d4;
        }
        .entry-card.active {
            border-left: 5px solid #c45c1a;
            background: #fffaf2;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transform: translateX(2px);
        }
        .entry-card:hover {
            background: #fff7ef;
            border-color: #decbae;
        }
        .entry-title {
            font-weight: 650;
            font-size: 1.2rem;
            color: #4a2c18;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .entry-chapter {
            font-size: 0.7rem;
            font-weight: 500;
            background: #f0e2d0;
            padding: 2px 10px;
            border-radius: 30px;
            color: #a55c2a;
        }
        .entry-time {
            font-size: 0.7rem;
            color: #b27d4a;
            margin: 8px 0 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .entry-summary {
            font-size: 0.8rem;
            color: #6e5b48;
            line-height: 1.4;
            margin-bottom: 12px;
        }
        .entry-thumb {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 16px;
            margin-top: 6px;
            background: #f0e3d6;
        }
        .map-area {
            flex: 1;
            position: relative;
            background: #e7e0d4;
        }
        #map-container {
            width: 100%;
            height: 100%;
        }
        .detail-card {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 340px;
            max-width: calc(100% - 48px);
            background: rgba(45, 28, 18, 0.85);
            backdrop-filter: blur(18px);
            border-radius: 28px;
            border-left: 4px solid #d97a2b;
            padding: 20px;
            color: #fdf3e0;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.35);
            z-index: 10;
            pointer-events: auto;
            transition: 0.2s;
        }
        .detail-title {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }
        .detail-meta {
            font-size: 0.7rem;
            display: flex;
            gap: 14px;
            border-left: 2px solid #d97a2b;
            padding-left: 10px;
            margin: 6px 0 12px;
            opacity: 0.9;
        }
        .detail-desc {
            font-size: 0.85rem;
            line-height: 1.45;
            margin: 8px 0 10px;
        }
        .carousel-container {
            margin: 14px 0;
            border-radius: 20px;
            overflow: hidden;
            background: #2e241d;
        }
        .carousel-inner { position: relative; width: 100%; height: 130px; overflow: hidden; }
        .carousel-slides { display: flex; transition: transform 0.3s; height: 100%; }
        .carousel-slide { flex: 0 0 100%; height: 100%; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
        .carousel-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.55); color: white; border: none; width: 26px; height: 26px;
            border-radius: 50%; cursor: pointer; font-size: 12px;
        }
        .btn-prev { left: 8px; } .btn-next { right: 8px; }
        .carousel-dots { display: flex; justify-content: center; gap: 6px; padding: 8px; background: #1f1914; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: #b8a18a; cursor: pointer; }
        .dot.active { background: #e6863a; width: 18px; border-radius: 4px; }
        .data-chart { background: #2a221c; border-radius: 18px; padding: 12px; margin-top: 10px; }
        .chart-label { font-size: 0.7rem; font-weight: 500; color: #e6bc8c; margin-bottom: 6px; letter-spacing: 0.3px; }
        .chart-bar-item { display: flex; align-items: center; justify-content: space-between; font-size: 0.7rem; margin: 8px 0; gap: 6px; }
        .bar-bg { background: #4e3d30; border-radius: 12px; height: 6px; flex: 1; overflow: hidden; }
        .bar-fill { background: #e6863a; width: 0%; height: 100%; }
        .choice-buttons { display: flex; gap: 12px; margin-top: 14px; }
        .choice-btn { background: #b45c26; border: none; padding: 8px; border-radius: 40px; flex: 1; color: white; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .choice-btn:hover { background: #94481b; }
        .ending-message {
            background: #5c3a24;
            border-radius: 20px;
            padding: 10px;
            margin-top: 12px;
            font-size: 0.8rem;
            line-height: 1.4;
        }
        .layer-switch {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
            border-radius: 44px; padding: 6px 12px; display: flex; gap: 8px; z-index: 20;
        }
        .layer-switch button {
            background: #4a3a2c; border: none; color: #f2e0cd; padding: 6px 16px;
            border-radius: 40px; cursor: pointer; font-size: 0.75rem; font-weight: 500;
        }
        .layer-switch button.active { background: #d9792a; color: #1e1a15; }
        .reset-tour {
            position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
            border-radius: 44px; padding: 6px 14px; display: flex; gap: 12px; z-index: 20;
        }
        .reset-tour button {
            background: transparent; border: none; color: #f7e5d3; font-size: 0.75rem; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
        }
        .reset-tour button:hover { color: #e6863a; }
        @media (max-width: 800px) {
            .entries-panel { width: 280px; }
            .detail-card { width: 260px; padding: 16px; bottom: 16px; right: 16px; }
            .carousel-inner { height: 100px; }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #e9e0d4; }
        ::-webkit-scrollbar-thumb { background: #bf8f64; border-radius: 10px; }
    </style>
   <script>
  window.baiduMapAK = "dNhf96bQojXJA6g2MhLrLo99XvxWXqd0";  // 这里填你自己的AK
  function loadBaiduMap() {
    var script = document.createElement('script');
    script.src = "https://api.map.baidu.com/api?v=2.0&ak=" + window.baiduMapAK + "&callback=initBaiduMap";
    document.head.appendChild(script);
  }
  window.onload = loadBaiduMap;
</script>
</head>
<body>
<div class="journal-container">
    <div class="entries-panel">
        <div class="journal-header">
            <h1><i class="fas fa-map"></i> 古渡日记账</h1>
            <p>宋代七座古渡 · 今日公园遗韵</p>
        </div>
        <div class="entries-list" id="entriesList"></div>
    </div>
    <div class="map-area">
        <div id="map-container"></div>
        <div class="layer-switch">
            <button id="switchNormal" class="active">街道</button>
            <button id="switchSatellite">卫星</button>
        </div>
        <div class="reset-tour">
            <button id="resetViewBtn"><i class="fas fa-undo-alt"></i> 重置视角</button>
            <button id="guidedTourBtn"><i class="fas fa-compass"></i> 天机指引</button>
        </div>
        <div class="detail-card" id="detailCard">
            <div class="detail-title" id="detailTitle">榕城古渡</div>
            <div class="detail-meta" id="detailMeta"><span>移动地图至公园附近</span></div>
            <div class="detail-desc" id="detailDesc">缩放或拖动地图，靠近圆形区域解锁古渡故事。也可点击左侧章节跳转。</div>
            <div id="carouselWidget" class="carousel-container" style="display:none;"></div>
            <div id="chartWidget" class="data-chart"></div>
            <div id="choiceWidget" style="display:none;" class="choice-buttons"></div>
        </div>
    </div>
</div>

<script>
    // 公园数据（百度坐标）
    const sites = [
        { id: "westlake", name: "福州西湖公园", lng: 119.30, lat: 26.10, zoomReq: 16.5,
          chapter: "西湖津", timeText: "宋 · 西北水路要冲", event: "宋代‘西湖渡’为西北粮运码头，如今化为柳堤游廊。",
          desc: "古时西湖与闽江相通，商船溯流而上。如今古榕依旧，渡口石阶早已沉入湖底。",
          multimedia: { featured: "柳堤 · 开化寺", area: "42.5公顷" },
          chartData: { yearBuilt: 282, annualVisitors: 280, greenCover: 78 },
          images: ["images/xihu_1.jpg","images/xihu_2.jpg","images/xihu_3.jpg"],
          clue: "西湖古渡石兽",
          layerRequired: null,
          summary: "晋代开凿，千年园林之母。"
        },
        { id: "minjiang", name: "闽江公园", lng: 119.27, lat: 26.07, zoomReq: 16,
          chapter: "苍霞渡", timeText: "宋 · 南台繁华码头", event: "宋代‘苍霞渡’是福州对内贸易中心，今为江滨休闲带。",
          desc: "需要切换至「卫星图」图层，查看古代河道弯曲痕迹。",
          multimedia: { featured: "江滨沙滩 · 桥梁", area: "74公顷" },
          chartData: { yearBuilt: 2000, annualVisitors: 420, greenCover: 85 },
          images: ["images/minjiang_1.jpg","images/minjiang_2.jpg","images/minjiang_3.jpg"],
          clue: "苍霞渡石碑残片",
          layerRequired: "satellite",
          summary: "江岸新绿，古渡新生。"
        },
        { id: "forestpark", name: "福州国家森林公园", lng: 119.2797, lat: 26.1556, zoomReq: 16.5,
          chapter: "屏山渡", timeText: "宋 · 山麓溪渡", event: "宋代‘屏山渡’连接北岭与城区，今为森林秘境。",
          desc: "千年古榕王见证了渡口兴衰，山涧曾行小舟。",
          multimedia: { featured: "千年榕树王 · 森林博物馆", area: "859公顷" },
          chartData: { yearBuilt: 1960, annualVisitors: 155, greenCover: 95 },
          images: ["images/senlin_1.jpg","images/senlin_2.jpg","images/senlin_3.jpg"],
          clue: "古渡拴船石",
          layerRequired: null,
          summary: "天然氧吧，古木参天。"
        },
        { id: "fudao", name: "金牛山 · 福道公园", lng: 119.27, lat: 26.09, zoomReq: 17,
          chapter: "分水岭", timeText: "抉择之地", event: "向左沿江，向右登山，不同路径引向不同渡口遗址结局。",
          desc: "此处为古渡分支：北往洪山渡，南往帮洲渡。",
          multimedia: { featured: "钢结构栈道 · 杜鹃谷", area: "连接5园" },
          chartData: { yearBuilt: 2016, annualVisitors: 400, greenCover: 90 },
          images: ["images/fudao_1.jpg","images/fudao_2.jpg","images/fudao_3.jpg"],
          clue: null,
          layerRequired: null,
          isChoice: true,
          summary: "空中步道，抉择岔路。"
        },
        { id: "huahai", name: "花海公园", lng: 119.37, lat: 26.04, zoomReq: 16,
          chapter: "雁塔渡", timeText: "宋 · 闽东水路", event: "宋代‘雁塔渡’是东南官渡，今为四季花海。",
          desc: "古渡石阶已没于滩涂，花海之下埋藏船运记忆。",
          multimedia: { featured: "波斯菊海 · 湿地观鸟", area: "65公顷" },
          chartData: { yearBuilt: 2013, annualVisitors: 320, greenCover: 82 },
          images: ["images/huahai_1.jpg","images/huahai_2.jpg","images/huahai_3.jpg"],
          clue: "雁塔古渡瓷片",
          layerRequired: null,
          summary: "四时花海，诗意收官。"
        }
    ];

    let map = null;
    let currentLayer = "normal";
    let unlockedSites = [false, false, false, false, false];
    let choiceMade = false;
    let endingText = "";          // 存储结局文本
    let finalUnlocked = false;
    let activeIndex = -1;
    let tourActive = false, tourTimer = null;
    let overlays = [], markers = [];

    // 渲染左侧章节列表
    function renderEntries() {
        const container = document.getElementById('entriesList');
        container.innerHTML = '';
        sites.forEach((site, idx) => {
            const card = document.createElement('div');
            card.className = 'entry-card';
            card.dataset.idx = idx;
            card.innerHTML = `
                <div class="entry-title">
                    <span>${site.name}</span>
                    <span class="entry-chapter">${site.chapter}</span>
                </div>
                <div class="entry-time"><i class="far fa-clock"></i> ${site.timeText}</div>
                <div class="entry-summary">${site.summary || site.event.substring(0, 40)}…</div>
                <img class="entry-thumb" src="${site.images[0]}" onerror="this.src='https://placehold.co/600x400/e0ccb8/9b6e42?text=预览图'">
            `;
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                activateChapter(idx, true);
            });
            container.appendChild(card);
        });
    }

    // 激活章节
    function activateChapter(index, flyToMap = true) {
        if (index < 0 || index >= sites.length) return;
        const site = sites[index];
        if (flyToMap) {
            const point = new BMap.Point(site.lng, site.lat);
            map.centerAndZoom(point, site.zoomReq);
        }
        document.querySelectorAll('.entry-card').forEach((card, i) => {
            card.classList.toggle('active', i === index);
        });
        updateDetailPanel(index);
        activeIndex = index;
        if (!unlockedSites[index]) attemptUnlock(index);
    }

    function attemptUnlock(index, forced = false) {
        if (unlockedSites[index]) return true;
        const site = sites[index];
        if (site.layerRequired && currentLayer !== site.layerRequired && !forced) {
            document.getElementById('detailDesc').innerHTML = `<strong>需要卫星图</strong><br>此处古渡记忆需要切换至「卫星图」图层。`;
            return false;
        }
        unlockedSites[index] = true;
        updateDetailPanel(index);
        const point = new BMap.Point(site.lng, site.lat);
        const info = new BMap.InfoWindow(`解锁：${site.chapter}`, { width: 140 });
        map.openInfoWindow(info, point);
        setTimeout(() => map.closeInfoWindow(), 1600);
        return true;
    }

    function updateDetailPanel(index) {
        const site = sites[index];
        const unlocked = unlockedSites[index];
        document.getElementById('detailTitle').innerHTML = `<i class="fas fa-map-pin"></i> ${site.name}`;
        document.getElementById('detailMeta').innerHTML = `<span>${site.timeText}</span><span>${site.name}</span>`;
        let descText = `<strong>${site.event}</strong><br>${site.desc}`;
        if (unlocked && site.clue) descText += `<br><span style="background:#804e26; padding:2px 10px; border-radius:20px; display:inline-block; margin-top:6px;">线索：${site.clue}</span>`;
        if (!unlocked) descText = `<strong>未解之谜</strong><br>请缩放并移动至公园区域。${site.layerRequired ? ' 需切换卫星图层。' : ''}`;
        
        // 如果已经做出选择并且当前是福道公园，显示结局
        if (choiceMade && site.id === 'fudao' && endingText) {
            descText += `<div class="ending-message">${endingText}</div>`;
        }
        document.getElementById('detailDesc').innerHTML = descText;

        const carouselDiv = document.getElementById('carouselWidget');
        if (unlocked && site.images?.length) {
            buildCarousel(site.images, carouselDiv);
        } else {
            carouselDiv.style.display = 'none';
        }
        const chartDiv = document.getElementById('chartWidget');
        if (unlocked && site.chartData) {
            const cd = site.chartData;
            chartDiv.innerHTML = `
                <div class="chart-label">公园生态数据</div>
                <div class="chart-bar-item"><span>建成年份</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.min((cd.yearBuilt-200)/20,100)}%"></div></div><span>${cd.yearBuilt}</span></div>
                <div class="chart-bar-item"><span>年游客(万)</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(cd.annualVisitors/5,100)}%"></div></div><span>${cd.annualVisitors}</span></div>
                <div class="chart-bar-item"><span>绿化率(%)</span><div class="bar-bg"><div class="bar-fill" style="width:${cd.greenCover}%"></div></div><span>${cd.greenCover}</span></div>
                <div style="font-size:0.7rem; text-align:center; margin-top:8px;">${site.multimedia.featured} | ${site.multimedia.area}</div>
            `;
        } else {
            chartDiv.innerHTML = `<div style="text-align:center;"><i class="fas fa-lock"></i> 靠近解锁后可见数据</div>`;
        }
        const choiceWidget = document.getElementById('choiceWidget');
        // 只有福道公园且未做出选择时才显示按钮
        if (unlocked && site.isChoice && !choiceMade) {
            choiceWidget.style.display = 'flex';
            choiceWidget.innerHTML = `<button class="choice-btn" id="choiceLeft">登高望远</button><button class="choice-btn" id="choiceRight">沿江寻踪</button>`;
            document.getElementById('choiceLeft').onclick = () => makeChoice('mountain');
            document.getElementById('choiceRight').onclick = () => makeChoice('river');
        } else {
            choiceWidget.style.display = 'none';
        }
    }

    function buildCarousel(images, container) {
        if (!container) return;
        if (!images || images.length === 0) { container.style.display = 'none'; return; }
        container.style.display = 'block';
        container.innerHTML = `
            <div class="carousel-inner">
                <button class="carousel-btn btn-prev"><i class="fas fa-chevron-left"></i></button>
                <div class="carousel-slides" id="carouselSlides"></div>
                <button class="carousel-btn btn-next"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="carousel-dots" id="carouselDots"></div>
        `;
        const slidesDiv = container.querySelector('#carouselSlides');
        const dotsDiv = container.querySelector('#carouselDots');
        let currentIdx = 0;
        images.forEach((src, i) => {
            const slide = document.createElement('div'); slide.className = 'carousel-slide';
            const img = document.createElement('img'); img.src = src; img.onerror = () => { img.src = 'https://placehold.co/600x400/d9c6b0/aa7c54?text=image'; };
            slide.appendChild(img); slidesDiv.appendChild(slide);
            const dot = document.createElement('div'); dot.className = 'dot'; dot.addEventListener('click', () => goToSlide(i));
            dotsDiv.appendChild(dot);
        });
        function update() { slidesDiv.style.transform = `translateX(-${currentIdx * 100}%)`; Array.from(dotsDiv.children).forEach((d, i) => i === currentIdx ? d.classList.add('active') : d.classList.remove('active')); }
        function goToSlide(i) { if (i >= 0 && i < images.length) { currentIdx = i; update(); } }
        container.querySelector('.btn-prev').onclick = () => goToSlide(currentIdx - 1);
        container.querySelector('.btn-next').onclick = () => goToSlide(currentIdx + 1);
        update();
    }

    function makeChoice(direction) {
        if (choiceMade) return;
        choiceMade = true;
        if (direction === 'mountain') {
            endingText = "登高望远，发现洪山古渡遗迹。当年的拴船石仍立于悬崖。集齐四块令牌，遥望闽江，感叹沧海桑田。";
        } else {
            endingText = "沿江寻踪，找到帮洲古渡遗址，江岸石阶犹存。集齐四块令牌，完成渡口群像拼图。";
        }
        // 更新当前福道公园的面板以显示结局
        if (activeIndex === 3) { // 福道索引为3
            updateDetailPanel(3);
        }
        // 可选：弹出一个提示，但不要强制跳转到花海
        const point = new BMap.Point(sites[3].lng, sites[3].lat);
        const info = new BMap.InfoWindow(`抉择已定：${direction === 'mountain' ? '登高' : '沿江'}，古渡故事圆满。`, { width: 180 });
        map.openInfoWindow(info, point);
        setTimeout(() => map.closeInfoWindow(), 2500);
        // 不再强制跳转花海，但可以标记结局已完成
        finalUnlocked = true;
    }

    // 地图初始化
    function initMap() {
        map = new BMap.Map("map-container");
        const center = new BMap.Point(119.285, 26.085);
        map.centerAndZoom(center, 13);
        map.enableScrollWheelZoom(true);
        map.enableDragging();
        map.addControl(new BMap.NavigationControl());
        map.addControl(new BMap.ScaleControl());

        const points = sites.map(s => new BMap.Point(s.lng, s.lat));
        const polyline = new BMap.Polyline(points, { strokeColor: "#c96f2e", strokeWeight: 3, strokeStyle: "dashed", strokeOpacity: 0.8 });
        map.addOverlay(polyline);
        overlays.push(polyline);
        for (let i = 0; i < points.length - 1; i++) {
            const mid = new BMap.Point((points[i].lng + points[i + 1].lng) / 2, (points[i].lat + points[i + 1].lat) / 2);
            const marker = new BMap.Marker(mid, { icon: new BMap.Icon("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 10'%3E%3Ccircle cx='5' cy='5' r='4' fill='%23c96f2e'/%3E%3C/svg%3E", new BMap.Size(8, 8)) });
            map.addOverlay(marker);
            overlays.push(marker);
        }
        sites.forEach(site => {
            const point = new BMap.Point(site.lng, site.lat);
            const circle = new BMap.Circle(point, 450, { strokeColor: "#b87a48", strokeWeight: 1, fillColor: "#d17f3a", fillOpacity: 0.12 });
            map.addOverlay(circle);
            overlays.push(circle);
            const marker = new BMap.Marker(point);
            map.addOverlay(marker);
            markers.push(marker);
        });
        const startIcon = new BMap.Icon("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext x='2' y='20' font-size='18' fill='%23c96f2e'%3E▶%3C/text%3E%3C/svg%3E", new BMap.Size(20, 20));
        const endIcon = new BMap.Icon("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext x='2' y='20' font-size='18' fill='%23c96f2e'%3E🏁%3C/text%3E%3C/svg%3E", new BMap.Size(20, 20));
        const startM = new BMap.Marker(points[0], { icon: startIcon });
        const endM = new BMap.Marker(points[points.length - 1], { icon: endIcon });
        map.addOverlay(startM); overlays.push(startM);
        map.addOverlay(endM); overlays.push(endM);

        map.addEventListener("moveend", detectNearest);
        map.addEventListener("zoomend", detectNearest);
        setTimeout(detectNearest, 500);
    }

    function detectNearest() {
        const center = map.getCenter();
        const zoom = map.getZoom();
        let best = -1, bestDist = 800;
        for (let i = 0; i < sites.length; i++) {
            const s = sites[i];
            const dist = map.getDistance(center, new BMap.Point(s.lng, s.lat));
            if (zoom >= s.zoomReq && dist < 700) {
                if (best === -1 || dist < bestDist) { best = i; bestDist = dist; }
            }
        }
        if (best !== -1) {
            if (!unlockedSites[best]) attemptUnlock(best);
            if (activeIndex !== best) activateChapter(best, false);
        } else if (best === -1 && !finalUnlocked) {
            if (activeIndex !== -999) {
                document.getElementById('detailTitle').innerHTML = '<i class="fas fa-map-marked-alt"></i> 古渡谜图';
                document.getElementById('detailMeta').innerHTML = '<span>缩放地图至圆形区域</span>';
                document.getElementById('detailDesc').innerHTML = '移动并放大地图，靠近任一公园圆圈，自动解锁古渡故事。左侧章节可快速跳转。';
                document.getElementById('carouselWidget').style.display = 'none';
                document.getElementById('chartWidget').innerHTML = '<div style="text-align:center;">📍 接近公园，故事显现</div>';
                activeIndex = -999;
            }
        }
    }

    function setLayer(type) {
        if (type === 'satellite') {
            map.setMapType(BMAP_SATELLITE_MAP);
            currentLayer = "satellite";
        } else {
            map.setMapType(BMAP_NORMAL_MAP);
            currentLayer = "normal";
        }
        document.getElementById('switchNormal').classList.toggle('active', type === 'normal');
        document.getElementById('switchSatellite').classList.toggle('active', type === 'satellite');
        setTimeout(detectNearest, 400);
    }

    function startGuide() {
        if (tourActive) { if (tourTimer) clearTimeout(tourTimer); tourActive = false; return; }
        tourActive = true;
        let step = 0;
        const order = [0, 1, 2, 3, 4];
        function next() {
            if (!tourActive || step >= order.length) { tourActive = false; return; }
            const idx = order[step];
            const target = sites[idx];
            map.centerAndZoom(new BMap.Point(target.lng, target.lat), target.zoomReq);
            const handler = () => {
                map.removeEventListener("moveend", handler);
                if (tourActive) {
                    if (target.layerRequired && currentLayer !== target.layerRequired) {
                        document.getElementById('detailDesc').innerHTML = `<strong>需要卫星图</strong><br>请点击右上角切换至卫星图。`;
                    } else {
                        attemptUnlock(idx);
                        activateChapter(idx, false);
                    }
                    step++;
                    tourTimer = setTimeout(next, 4800);
                }
            };
            map.addEventListener("moveend", handler);
            tourTimer = setTimeout(() => { map.removeEventListener("moveend", handler); if (tourActive) next(); }, 5500);
        }
        next();
    }

    function resetView() { map.centerAndZoom(new BMap.Point(119.285, 26.085), 13); }

    window.initBaiduMap = function () {
        initMap();
        renderEntries();
        document.getElementById('switchNormal').onclick = () => setLayer('normal');
        document.getElementById('switchSatellite').onclick = () => setLayer('satellite');
        document.getElementById('resetViewBtn').onclick = resetView;
        document.getElementById('guidedTourBtn').onclick = startGuide;
    };
    window.initBaiduMap();
</script>
</body>
</html>
